{{define "gallery_modals"}}

<!-- Lightbox Modal -->
<div id="lightbox" class="lightbox-modal">

    <img class="lightbox-content" id="lightbox-img">

    <!-- Floating Toolbar -->
    <div class="lightbox-toolbar">
        <button id="lightbox-info-btn" class="icon-button" title="Info">
            <span class="material-symbols-outlined">info</span>
        </button>
        <button id="lightbox-download-btn" class="icon-button" title="Download">
            <span class="material-symbols-outlined">download</span>
        </button>
        <button id="lightbox-delete-btn" class="icon-button" title="Delete">
            <span class="material-symbols-outlined">delete</span>
        </button>
        <button id="lightbox-close-btn" class="icon-button" title="Close">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>
</div>

<!-- Info Modal -->
<div id="info-modal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <div id="info-modal-body"></div>
    </div>
</div>

<!-- Change Date Modal -->
<div id="change-date-modal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3>Change Photo Date</h3>
        <p>Current date: <span id="current-date-display"></span></p>
        <form id="change-date-form">
            <input type="hidden" id="change-date-filename">
            <label for="new-date-input">New date and time:</label>
            <input type="datetime-local" id="new-date-input" name="new_date" required>
            <div class="modal-actions">
                <button type="button" id="change-date-cancel-btn">Cancel</button>
                <button type="submit">Save</button>
            </div>
        </form>
    </div>
</div>

<!-- Batch Change Date Modal -->
<div id="batch-change-date-modal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3>Batch Change Date</h3>
        <p>Set the date and time for the first photo. Subsequent photos will be incremented by one minute.</p>
        <form id="batch-change-date-form">
            <label for="batch-new-date-input">Start date and time:</label>
            <input type="datetime-local" id="batch-new-date-input" name="new_date" required>
            <div class="modal-actions">
                <button type="button" id="batch-change-date-cancel-btn">Cancel</button>
                <button type="submit">Start</button>
            </div>
        </form>
    </div>
</div>

<!-- M3 "Add to Album" Dialog -->
<div id="add-to-album-modal" class="m3-dialog-scrim">
    <div class="m3-dialog" role="dialog" aria-labelledby="add-to-album-headline">
        <form id="add-to-album-form">
            <!-- Headline -->
            <div class="m3-dialog-headline" id="add-to-album-headline">Add to album</div>

            <!-- Content -->
            <div class="m3-dialog-content">
                <label for="album-select" class="m3-dialog-supporting-text">Select an album to add the selected photos
                    to.</label>
                <select id="album-select" class="m3-select" required>
                    <!-- Options will be populated by JS -->
                </select>
            </div>

            <!-- Actions -->
            <div class="m3-dialog-actions">
                <button type="button" class="m3-button" id="add-to-album-cancel-btn">Cancel</button>
                <button type="submit" class="m3-button">Add</button>
            </div>
        </form>
    </div>
</div>

<!-- Progress Modal -->
<div id="progress-modal" class="modal">
    <div class="modal-content">
        <h3 id="progress-title">Processing...</h3>
        <p id="progress-text">Please wait.</p>
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div class="modal-actions">
            <button id="progress-cancel-btn">Cancel</button>
        </div>
    </div>
</div>

<!-- Login Modal (inside gallery for re-authentication) -->
<div id="login-modal" class="modal">
    <div class="modal-content">
        <h3>Session Expired</h3>
        <p>Please log in again to continue.</p>
        <form id="modal-login-form">
            <!-- Login form fields can be added here if needed, or just a button -->
            <p id="login-modal-error" style="color: red;"></p>
            <button type="submit" class="m3-button">Login</button>
        </form>
    </div>
</div>

{{end}}
