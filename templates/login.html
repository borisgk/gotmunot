<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - Tmunot</title>
    <link rel="icon" href="/static/img/favicon-96x96.png" type="image/png">    
    <!--Import Google Icon Font-->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!--Import materialize.css-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@materializecss/materialize@2.2.2/dist/css/materialize.min.css">

    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        body {
            display: flex;
            min-height: 100vh;
            flex-direction: column;
            background-color: #f4f4f4;
        }
        main {
            flex: 1 0 auto;
            display: flex;
            align-items: center;
        }
        form .input-field {
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <div class="row">
                <div class="col s12 m8 offset-m2 l6 offset-l3">
                    <div class="card-panel z-depth-2">
                        <h4 class="center-align">Tmunot Login</h4>
                        <form method="POST" action="/login">
                            <input type="hidden" name="redirect_url" value="{{.RedirectURL}}">
                            <div class="input-field"><i class="material-icons prefix">account_circle</i><input id="username" name="username" type="text" class="validate" required><label for="username">Username</label></div>
                            <div class="input-field"><i class="material-icons prefix">lock</i><input id="password" name="password" type="password" class="validate" required><label for="password">Password</label></div>
                            <div class="center-align"><button class="btn waves-effect waves-light" type="submit">Login<i class="material-icons right">send</i></button></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@materializecss/materialize@2.2.2/dist/js/materialize.min.js"></script>
</body>
</html>
