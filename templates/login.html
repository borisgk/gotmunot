<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/img/favicon-96x96.png" type="image/png">
    <title>Tmunot Login</title>
    <link rel="stylesheet" href="/static/css/fonts.css">
    
    <!-- Tailwind is used strictly for layout utilities as requested, custom CSS handles M3 specs -->
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->

    <link rel="stylesheet" href="/static/css/login.css">

</head>


<body>

    <div class="login-card">
        <h1 class="headline">Tmunot Login</h1>
        
        {{if .Error}}
            <p style="color: #B00020; text-align: center; margin-bottom: 1em;">{{.Error}}</p>
        {{end}}

        <form id="loginForm" method="POST" action="/login">

            <input type="hidden" name="redirect_url" value="{{.RedirectURL}}">

            <!-- Username Field -->
            <div class="text-field">
                <!-- Placeholder space required for CSS selector trick -->
                <input type="text" id="username" name="username" placeholder=" " required autocomplete="username">
                <label for="username">Username</label>
            </div>

            <!-- Password Field -->
            <div class="text-field">
                <input type="password" id="password" name="password" placeholder=" " required autocomplete="current-password">
                <label for="password">Password</label>
            </div>

            <!-- Login Button -->
            <button type="submit" class="m3-button" id="loginBtn">
                Login
            </button>
        </form>
    </div>
    
    <script src="/static/js/login.js" defer></script>
</body>
</html>
