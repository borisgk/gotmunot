<!DOCTYPE html>
<html>
<head>
    <title>Upload Photos</title>
    <link rel="icon" href="/static/img/favicon-96x96.png" type="image/png">
    <!-- Link to locally hosted fonts -->
    <link rel="stylesheet" href="/static/css/fonts.css">
    <link rel="stylesheet" href="/static/css/gallery.css">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            padding-top: 70px; /* Space for the fixed top nav */
        }
        .content-wrapper {
            padding: 0 2em; /* Add horizontal padding */
        }
        .upload-item {
            margin-bottom: 0.5em;
        }
        .upload-item-inner {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px;
            border-bottom: 1px solid #eee;
        }
        .upload-item-label {
            display: block;
            margin-bottom: 4px;
            font-size: 0.9em;
        }
        .upload-item-placeholder {
            padding: 5px;
            font-size: 0.9em;
            color: #555;
            border-bottom: 1px solid #eee;
        }
        .upload-item-thumb {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            background-color: #f0f0f0;
            flex-shrink: 0;
        }
        .progress-bar-container {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar {
            width: 0;
            height: 10px;
            background-color: #4caf50;
            transition: width 0.2s ease-in-out;
        }
        #thumbnail-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 1em;
        }
        #thumbnail-grid img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 4px;
        }
        #upload-status {
            max-height: 50vh; /* 50% of the viewport height */
            overflow-y: auto;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    
    <!-- Showing the top application bar which is common for all pages -->
	{{template "header" .}}

    <div class="content-wrapper">
        <h2>Upload Files</h2>
        <form id="uploadForm">
            <div>
                <label for="photo">Select files:</label>
                <input type="file" id="photo" name="photo" multiple>
                <button type="submit" id="uploadButton">Upload</button>
                <button type="button" id="galleryButton" style="display: none;">Go to Gallery</button>
            </div>
        </form>

        <div id="upload-status" style="margin-top: 20px;"></div>
    </div>

    <script src="/static/js/upload.js"></script>
</body>
</html>
