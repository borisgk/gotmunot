<!DOCTYPE html>
<html>

<head>
    <title>Upload Photos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/img/favicon-96x96.png" type="image/png">
    <!-- Link to locally hosted fonts -->
    <link rel="stylesheet" href="/static/css/fonts.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/css/app-bar.css">
    <link rel="stylesheet" href="/static/css/navigation-rail.css">
    <script src="/static/js/app-bar.js" defer></script>
    <link rel="stylesheet" href="/static/css/upload.css">

</head>

<body>

    <!-- Showing the top application bar which is common for all pages -->
    {{template "header" .}}

    <!-- Show the navigation rail -->
    {{template "nav_rail" .}}

    <div class="content-wrapper">
        <h2>Upload Files</h2>
        <form id="uploadForm">
            <div>
                <label for="photo">Select files:</label>
                <input type="file" id="photo" name="photo" multiple>
                <button type="submit" id="uploadButton">Upload</button>
                <button type="button" id="galleryButton" style="display: none;">Go to Gallery</button>
            </div>
        </form>

        <div id="upload-status" style="margin-top: 20px;"></div>
    </div>

    <script src="/static/js/upload.js?v=6"></script>
</body>

</html>
