<!DOCTYPE html>
<html>
<head>
    <title>Upload Photos</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            margin: 2em;
        }
    </style>
</head>
<body>
    <h1>Upload Photos</h1>
    <p>Welcome, {{.Username}}!</p>

    <hr>
    <h2>Upload Files</h2>
    <form id="uploadForm">
        <div>
            <label for="photo">Select files:</label>
            <input type="file" id="photo" name="photo" multiple>
            <button type="submit" id="uploadButton">Upload</button>
        </div>
    </form>

    <div id="upload-status" style="margin-top: 20px;"></div>

    <a href="/content">Back to Content</a> | <a href="/logout">Logout</a>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const fileInput = document.getElementById('photo');
        const uploadButton = document.getElementById('uploadButton');
        const uploadStatus = document.getElementById('upload-status');

        function uploadFile(file) {
            return new Promise((resolve, reject) => {
                const formData = new FormData();
                formData.append('photo', file);

                const xhr = new XMLHttpRequest();
                const statusElement = document.createElement('div');
                uploadStatus.appendChild(statusElement);

                xhr.upload.addEventListener('progress', (event) => {
                    if (event.lengthComputable) {
                        const percentComplete = Math.round((event.loaded / event.total) * 100);
                        statusElement.textContent = `Uploading ${file.name}: ${percentComplete}%`;
                    }
                });

                xhr.addEventListener('load', () => {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        try {
                            const result = JSON.parse(xhr.responseText);
                            if (result.status === 'success') {
                                let successMessage = `✅ ${file.name} - ${result.message}`;
                                if (result.exifRead) {
                                    successMessage += " (EXIF data read)";
                                }
                                statusElement.textContent = successMessage;
                            } else {
                                statusElement.textContent = `❌ ${file.name} - Error: ${result.message}`;
                            }
                        } catch (e) {
                            statusElement.textContent = `❌ ${file.name} - Error parsing server response.`;
                        }
                    } else {
                        statusElement.textContent = `❌ ${file.name} - Server error: ${xhr.statusText}`;
                    }
                    resolve();
                });

                xhr.addEventListener('error', () => {
                    statusElement.textContent = `❌ ${file.name} - Network or server error.`;
                    resolve(); // Resolve so the next file can start
                });

                xhr.open('POST', '/upload', true);
                xhr.send(formData);
            });
        }

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const files = fileInput.files;
            if (files.length === 0) {
                alert('Please select files to upload.');
                return;
            }
            uploadButton.disabled = true;
            uploadStatus.innerHTML = '<h3>Upload Progress:</h3>';
            for (const file of files) {
                await uploadFile(file); // Wait for one file to finish before starting the next
            }
            uploadButton.disabled = false;
            uploadForm.reset(); // Clear the file input
        });
    </script>
</body>
</html>
