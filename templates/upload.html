<!DOCTYPE html>
<html>
<head>
    <title>Upload Photos</title>
    <!-- Link to locally hosted fonts -->
    <link rel="stylesheet" href="/static/css/fonts.css">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            margin: 2em;
        }
    </style>
</head>
<body>
    <h1>Upload Photos</h1>
    <p>Welcome, {{.Username}}!</p>

    <hr>
    <h2>Upload Files</h2>
    <form id="uploadForm">
        <div>
            <label for="photo">Select files:</label>
            <input type="file" id="photo" name="photo" multiple>
            <button type="submit" id="uploadButton">Upload</button>
        </div>
    </form>

    <script src="/static/js/task-poller.js"></script>

    <!-- The Progress Modal (for batch processing after upload) -->
    <div id="progress-modal" class="info-modal" style="display: none;">
        <div class="info-modal-content">
            <h3 id="progress-title">Processing Uploads...</h3>
            <p id="progress-text"></p>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <button id="progress-cancel-btn" class="cancel-btn">Cancel</button>
        </div>
    </div>


    <div id="upload-status" style="margin-top: 20px;"></div>

    <a href="/gallery">Back to Gallery</a> | <a href="/logout">Logout</a>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const fileInput = document.getElementById('photo');
        const uploadButton = document.getElementById('uploadButton');
        const uploadStatus = document.getElementById('upload-status');
        const uploadedFilenames = []; // To store filenames for batch processing

        function uploadFile(file) {
            return new Promise((resolve, reject) => {
                const formData = new FormData();
                formData.append('photo', file);

                const xhr = new XMLHttpRequest();
                const statusElement = document.createElement('div');
                uploadStatus.appendChild(statusElement);

                xhr.upload.addEventListener('progress', (event) => {
                    if (event.lengthComputable) {
                        const percentComplete = Math.round((event.loaded / event.total) * 100);
                        statusElement.textContent = `Uploading ${file.name}: ${percentComplete}%`;
                    }
                });

                xhr.addEventListener('load', () => {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        try {
                            const result = JSON.parse(xhr.responseText);
                            if (result.status === 'success') {
                                let successMessage = `✅ ${file.name} - ${result.message}`;
                                uploadedFilenames.push(result.filename); // Collect filename
                                if (result.exifRead) {
                                    successMessage += " (EXIF data read)";
                                }
                                statusElement.textContent = successMessage;
                            } else {
                                statusElement.textContent = `❌ ${file.name} - Error: ${result.message}`;
                            }
                        } catch (e) {
                            statusElement.textContent = `❌ ${file.name} - Error parsing server response.`;
                        }
                    } else {
                        statusElement.textContent = `❌ ${file.name} - Server error: ${xhr.statusText}`;
                    }
                    resolve();
                });

                xhr.addEventListener('error', () => {
                    statusElement.textContent = `❌ ${file.name} - Network or server error.`;
                    resolve(); // Resolve so the next file can start
                });

                xhr.open('POST', '/upload', true);
                xhr.send(formData);
            });
        }

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const files = fileInput.files;
            if (files.length === 0) {
                alert('Please select files to upload.');
                return;
            }
            uploadedFilenames.length = 0; // Clear previous uploads
            uploadButton.disabled = true;
            uploadStatus.innerHTML = '<h3>Upload Progress:</h3>';
            for (const file of files) {
                await uploadFile(file); // Wait for one file to finish before starting the next
            }
            uploadButton.disabled = false;
            fileInput.value = ''; // Clear the file input more reliably

            // After all files are uploaded, trigger batch processing for thumbnails
            if (uploadedFilenames.length > 0) {
                await startBatchThumbnailGeneration(uploadedFilenames);
            } else {
                // If no files were successfully uploaded, just reset.
                uploadForm.reset();
            }
        });

        async function startBatchThumbnailGeneration(filenames) {
            const progressModal = document.getElementById('progress-modal');
            const progressTitle = document.getElementById('progress-title');
            const progressText = document.getElementById('progress-text');
            const progressBar = document.getElementById('progress-bar');

            progressTitle.textContent = 'Generating Thumbnails...';
            progressText.textContent = 'Starting batch processing...';
            progressBar.style.width = '0%';
            progressModal.style.display = 'block';

            try {
                const response = await fetch('/api/photos/process-thumbnails', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filenames: filenames }),
                });

                if (!response.ok) throw new Error('Failed to start thumbnail generation.');

                const { task_id } = await response.json();
                
                // Poll for status. On completion, redirect to the gallery.
                window.pollTaskStatus(task_id, {
                    onComplete: () => window.location.href = '/gallery',
                });
            } catch (error) {
                alert(`Could not start batch processing: ${error.message}`);
                progressModal.style.display = 'none';
            }
        };
    </script>
</body>
</html>
