{{define "header"}}
	<header class="m3-app-bar">
		<!-- Normal App Bar Content -->
		<div class="normal-content" style="display: flex; align-items: center; width: 100%;">
			<button id="nav-rail-trigger" class="icon-button" title="Navigation"><span class="material-symbols-outlined">menu</span></button>
			<span class="app-bar-title">Tmunot</span>
			<div class="actions">
				<a href="/logout" class="icon-button" title="Logout">
					<span class="material-symbols-outlined">logout</span>
				</a>
			</div>
		</div>

		<!-- Contextual Action Bar Content (initially hidden) -->
		<div class="contextual-content" style="display: none; align-items: center; width: 100%;">
			<button id="clear-selection-btn" class="icon-button" title="Clear selection">
				&#x2715; <!-- Close icon -->
			</button>
			<!-- M3 Split Button -->
			<div class="m3-split-button">
				<button id="selection-main-action" class="main-action">
					<span id="selection-count">0 selected</span>
				</button>
				<button id="selection-menu-button" class="dropdown-trigger icon-button" aria-haspopup="true" aria-expanded="false" aria-controls="selection-menu">
					<span class="material-symbols-outlined">arrow_drop_down</span>
				</button>
				<ul class="m3-menu" id="selection-menu" role="menu" aria-labelledby="selection-menu-button">
					<li class="m3-menu-item" role="menuitem" tabindex="-1" id="add-to-album-item">
						Add to album...
					</li>
					<!-- Other items can be added here -->
				</ul>
			</div>
		</div>
	</header>
{{end}}
