<!DOCTYPE html>
<html>
<head>
	<title>New Album</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="/static/img/favicon-96x96.png" type="image/png">
	<link rel="stylesheet" href="/static/css/fonts.css">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
	<link rel="stylesheet" href="/static/css/common.css">
	<link rel="stylesheet" href="/static/css/app-bar.css">
	<link rel="stylesheet" href="/static/css/navigation-rail.css">
	<link rel="stylesheet" href="/static/css/albums.css">
	<script src="/static/js/app-bar.js" defer></script>
	<script src="/static/js/new_album.js" defer></script>
</head>
<body style="padding-top: 80px; padding-left: 0;">
	<!-- Include the common header -->
	{{template "header" .}}

	<!-- Show the navigation rail -->
	{{template "nav_rail" .}}

	<div class="new-album-container">
		<h1>Create New Album</h1>
		<form id="new-album-form">
			<div class="form-group">
				<label for="album-name">Album Name</label>
				<input type="text" id="album-name" name="album-name" required placeholder="e.g., Summer Vacation">
			</div>
			<div class="form-group">
				<label for="album-description">Description</label>
				<textarea id="album-description" name="album-description" rows="4" placeholder="A short description of the album..."></textarea>
			</div>

			<div class="form-actions">
				<button type="submit" name="action" value="add_later" class="secondary-btn">Save Album</button>
				<button type="submit" name="action" value="add_now" class="primary-btn">Save and Add Photos</button>
			</div>
		</form>
	</div>

</body>
</html>
