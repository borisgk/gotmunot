<!DOCTYPE html>
<html>
<head>
	<title>Content</title>
	<style>
		body {
			font-family: sans-serif;
			margin: 0;
			padding-top: 60px; /* Add padding to body to avoid content being hidden by fixed nav */
		}
		.photo-gallery {
			display: flex;
			flex-wrap: wrap;
			justify-content: space-between; /* Distribute items evenly */
			gap: 2px;
		}
		.photo-gallery img {
			height: 250px; /* Made thumbnails bigger */
			width: 100%;   /* Image fills its container */
			display: block;
			object-fit: cover; /* Ensures image covers the area, cropping to fit */
		}
		.photo-item {
			flex-grow: 1; /* Allows items to grow and fill the row */
			position: relative; /* For potential future overlays */
		}
		.photo-item p {
			margin: 5px 0 0 0;
			font-size: 0.8em;
		}
        .photo-gallery::after {
            content: "";
            flex-grow: 10; /* Large grow factor to push items to the left */
        }

		/* Lightbox Modal Styles */
		.modal {
			display: none; /* Hidden by default */
			position: fixed; /* Stay in place */
			z-index: 1000; /* Sit on top */
			padding: 0; /* Remove padding to allow full screen */
			left: 0;
			top: 0;
			width: 100%; /* Full width */
			height: 100%; /* Full height */
			overflow: auto; /* Enable scroll if needed */
			background-color: rgba(0,0,0,0.9); /* Black w/ opacity */
		}

		.modal-content {
			margin: auto;
			display: block;
			width: 100vw; /* Full viewport width */
			height: 100vh; /* Full viewport height */
			object-fit: contain; /* Fit image within viewport, preserving aspect ratio */
		}

		.close {
			position: absolute;
			top: 20px;
			right: 45px;
			z-index: 1001; /* Ensure it's above the image */
			color: #f1f1f1;
			font-size: 40px;
			font-weight: bold;
			transition: 0.3s;
		}

		.close:hover,
		.close:focus {
			color: #bbb;
			text-decoration: none;
			cursor: pointer;
		}

		/* Info Modal Styles */
		.info-modal {
			display: none; /* Hidden by default */
			position: fixed;
			z-index: 1002; /* Higher than lightbox */
			left: 0;
			top: 0;
			width: 100%;
			height: 100%;
			overflow: auto;
			background-color: rgba(0,0,0,0.6);
		}
		.info-modal-content {
			background-color: #fefefe;
			margin: 10% auto;
			padding: 20px;
			border: 1px solid #888;
			width: 80%;
			max-width: 600px;
			border-radius: 8px;
			position: relative;
		}
		.info-modal-content h3 {
			margin-top: 0;
		}
		.info-modal-content table {
			width: 100%;
			border-collapse: collapse;
		}
		.info-modal-content td {
			padding: 4px 8px;
			border-bottom: 1px solid #ddd;
		}

		/* Navigation Bar Styles */
		.top-nav {
			background-color: #333;
			overflow: hidden;
			position: fixed; /* Fix it to the top */
			top: 0;
			width: 100%;
			z-index: 999;
		}
		.top-nav a {
			float: left;
			color: #f2f2f2;
			text-align: center;
			padding: 14px 16px;
			text-decoration: none;
			font-size: 17px;
		}
		.top-nav a:hover {
			background-color: #ddd;
			color: black;
		}
		.top-nav-right {
			float: right;
		}

		/* Dropdown Menu Styles */
		.photo-menu-btn {
			position: absolute;
			top: 5px;
			right: 5px;
			background-color: rgba(0, 0, 0, 0.5);
			color: white;
			border: none;
			border-radius: 50%;
			cursor: pointer;
			font-size: 18px;
			line-height: 24px;
			width: 24px;
			height: 24px;
			padding: 0;
			z-index: 10;
		}
		.photo-menu-btn:hover {
			background-color: rgba(0, 0, 0, 0.8);
		}
		.dropdown-content {
			display: none;
			position: absolute;
			top: 30px;
			right: 5px;
			background-color: #f1f1f1;
			min-width: 100px;
			box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
			z-index: 11;
			border-radius: 4px;
		}
		.dropdown-content a {
			color: black;
			padding: 12px 16px;
			text-decoration: none;
			display: block;
		}
		.dropdown-content a:hover {
			background-color: #ddd;
		}
		.show {display:block;}

	</style>
</head>
<body>
	<div class="top-nav">
		<a href="/content">Gallery</a>
		<a href="/upload-page">Upload</a>
		<a href="/service">Service</a>
		<div class="top-nav-right">
			<a href="/logout">Logout ({{.Username}})</a>
		</div>
	</div>

	<h2 style="padding-left: 1em;">Recent Uploads</h2>
	{{if .Photos}}
		<div class="photo-gallery" data-total-photos="{{.TotalPhotos}}" data-limit="{{.Limit}}">
			{{range .Photos}}
			<div class="photo-item">
				<a href="#" class="lightbox-trigger" data-preview="/media/{{.Filepath | toPreviewPath | html }}">
					<img src="/media/{{.Filepath | toThumbPath}}" alt="{{.Filename}}" title="{{.Filename}}">
				</a>
				<button class="photo-menu-btn" data-filename="{{.Filename}}">&#8942;</button>
				<div class="dropdown-content">
					<a href="#" class="info-btn">Info</a>
					<a href="#" class="delete-btn">Delete</a>
				</div>
			</div>
			{{end}}
		</div>
	{{else}}
		<p style="padding-left: 1em;">No photos have been uploaded yet.</p>
	{{end}}

	<!-- The Lightbox Modal -->
	<div id="lightbox" class="modal">
		<span class="close">&times;</span>
		<img class="modal-content" id="lightbox-img">
	</div>

	<!-- The Info Modal -->
	<div id="info-modal" class="info-modal">
		<div class="info-modal-content">
			<span class="close">&times;</span>
			<div id="info-modal-body"></div>
		</div>
	</div>
	<script>
		// Get the modal
		const lightbox = document.getElementById("lightbox");
		if (lightbox) {
			const lightboxImg = document.getElementById("lightbox-img");
			const closeBtn = lightbox.querySelector(".close");

			// When the user clicks on <span> (x), close the modal
			closeBtn.onclick = function() {
				lightbox.style.display = "none";
			}
		}

		/* Info Modal Logic */
		const infoModal = document.getElementById("info-modal");
		const infoModalBody = document.getElementById("info-modal-body");
		const infoModalCloseBtn = infoModal.querySelector(".close");

		infoModalCloseBtn.onclick = function() {
			infoModal.style.display = "none";
		}
		window.onclick = function(event) {
			if (event.target == infoModal) {
				infoModal.style.display = "none";
			}
		}

		/* Dropdown Menu Logic */
		document.addEventListener('click', function(event) {
			// Close all open dropdowns unless a menu button is clicked
			// unless the click is inside an open dropdown
			if (!event.target.matches('.photo-menu-btn')) {
				let dropdowns = document.getElementsByClassName("dropdown-content");
				for (let i = 0; i < dropdowns.length; i++) {
					let openDropdown = dropdowns[i];
					if (openDropdown.classList.contains('show')) {
						openDropdown.classList.remove('show');
					}
				}
			}

			// When the user clicks anywhere on the lightbox background, close it
			if (event.target === lightbox) {
				lightbox.style.display = "none";
			}

			// Handle lightbox trigger clicks
			if (event.target.closest('.lightbox-trigger')) {
				event.preventDefault();
				lightbox.style.display = "block";
				lightbox.querySelector('#lightbox-img').src = event.target.closest('.lightbox-trigger').dataset.preview;
			}

			// Handle menu button clicks
			if (event.target.matches('.photo-menu-btn')) {
				event.preventDefault();
				// Find the dropdown content relative to the button
				const dropdown = event.target.nextElementSibling;
				dropdown.classList.toggle('show');
			}

			// Handle "Info" button clicks
			if (event.target.matches('.info-btn')) {
				event.preventDefault();
				const filename = event.target.closest('.photo-item').querySelector('.photo-menu-btn').dataset.filename;
				
				fetch(`/photo/info/${filename}`)
					.then(response => {
						if (!response.ok) {
							throw new Error(`HTTP error! status: ${response.status}`);
						}
						return response.json();
					})
					.then(data => {
						let content = `<h3>${data.Filename}</h3>`;
						content += '<table>';
						
						// Helper to add a row if the value is valid
						const addRow = (label, value) => {
							if (value && value.Valid) { // Check for uppercase 'Valid'
								let displayValue = value.String || value.Int64 || value.Float64; // Check for uppercase properties
								if (value.Time) displayValue = new Date(value.Time).toLocaleString(); // Check for uppercase 'Time'
								content += `<tr><td><strong>${label}</strong></td><td>${displayValue}</td></tr>`;
							}
						};

						addRow('Date Taken', data.DateTimeOriginal);
						addRow('Dimensions', { Valid: data.ImageWidth.Valid, String: `${data.ImageWidth.Int64} x ${data.ImageLength.Int64}` }); // This custom object is fine
						addRow('Camera Make', data.Make);
						addRow('Camera Model', data.Model);
						addRow('Lens Model', data.LensModel);
						addRow('F-Number', data.FNumber);
						addRow('Exposure Time', data.ExposureTime);
						addRow('ISO', data.ISOSpeedRatings);
						addRow('Focal Length', { Valid: data.FocalLength.Valid, String: `${data.FocalLength.Float64}mm` }); // This custom object is fine

						content += '</table>';
						infoModalBody.innerHTML = content;
						infoModal.style.display = "block";
					})
					.catch(error => {
						console.error('Error fetching photo info:', error);
						alert('Could not load photo information.');
					});
			}

			// Handle "Delete" button clicks
			if (event.target.matches('.delete-btn')) {
				event.preventDefault();
				const photoItem = event.target.closest('.photo-item');
				const filename = photoItem.querySelector('.photo-menu-btn').dataset.filename;
				
				if (confirm(`Are you sure you want to delete "${filename}"? This cannot be undone.`)) {
					// Placeholder for actual delete logic
					alert(`Deletion for "${filename}" has been requested.\n(Backend endpoint not yet implemented.)`);
					// Example of how you would remove it from the view:
					// photoItem.remove(); 
				}
			}
		});

		/* Lazy Loading Logic */
		const photoGallery = document.querySelector('.photo-gallery');
		if (photoGallery) {
			let currentPage = 1;
			const limit = parseInt(photoGallery.dataset.limit, 10) || 50;
			const totalPhotos = parseInt(photoGallery.dataset.totalPhotos, 10);
			let isLoading = false;

			// Function to create a photo item from data
			function createPhotoElement(photo) {
				const photoItem = document.createElement('div');
				photoItem.className = 'photo-item';

				// The Go template functions `toThumbPath` and `toPreviewPath` just add suffixes.
				// We can replicate that logic here in JS.
				const thumbPath = `/media/thumbs/${photo.Filepath}.webp`; // Uppercase 'F'
				const previewPath = `/media/previews/${photo.Filepath}`; // Uppercase 'F'

				photoItem.innerHTML = `
					<a href="#" class="lightbox-trigger" data-preview="${previewPath}">
						<img src="${thumbPath}" alt="${photo.Filename}" title="${photo.Filename}">
					</a>
					<button class="photo-menu-btn" data-filename="${photo.Filename}">&#8942;</button>
					<div class="dropdown-content">
						<a href="#" class="info-btn">Info</a>
						<a href="#" class="delete-btn">Delete</a>
					</div>
				`;
				return photoItem;
			}

			// Function to load more photos
			function loadMorePhotos() {
				// Stop if we are already loading or have loaded all photos
				if (isLoading || (currentPage * limit) >= totalPhotos) {
					return;
				}

				isLoading = true;
				currentPage++;

				// You can add a loading indicator here if you want
				// e.g., document.getElementById('loader').style.display = 'block';

				fetch(`/api/photos?page=${currentPage}&limit=${limit}`)
					.then(response => response.json())
					.then(photos => {
						if (photos && photos.length > 0) {
							photos.forEach(photo => {
								const photoEl = createPhotoElement(photo);
								photoGallery.appendChild(photoEl);
							});
						} else {
							// No more photos to load
							console.log('All photos loaded.');
						}
						isLoading = false;
						// Hide loading indicator
						// e.g., document.getElementById('loader').style.display = 'none';
					})
					.catch(error => {
						console.error('Error loading more photos:', error);
						isLoading = false; // Reset on error
					});
			}

			// Listen for scroll events
			window.addEventListener('scroll', () => {
				// Check if user has scrolled to the bottom of the page (with a 250px buffer)
				if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 250) {
					loadMorePhotos();
				}
			});
		}
	</script>
</body>
</html>
