<!-- Universal template to display a grid of thumbnails -->
<!-- TODO: Certain features should be turned on/off using parameters -->

{{define "photogrid"}}

<div id="gallery-container" data-username="{{.Username}}" data-total-photos="{{.TotalPhotos}}"
    data-filter-year="{{.FilterYear}}">
    {{if .DayGroups}}
    {{range .DayGroups}}
    <div class="date-header">
        <input type="checkbox" class="day-select-checkbox" title="Select all photos from this day">
        <h2 class="date-separator" data-date="{{.Date.Format " 2006-01-02"}}">
            {{.Date.Format "Monday, January 2, 2006"}}
            <span class="photo-count">({{.Count}} photos)</span>
        </h2>
    </div>
    <div class="photo-gallery">
        {{range .Photos}}
        <div class="photo-item" data-year="{{.DateTime.Year}}"
            style="--aspect-ratio: {{.ThumbWidth}} / {{.ThumbHeight}};">
            <input type="checkbox" class="photo-select-checkbox" data-filename="{{.Filename}}">
            <a href="#" class="lightbox-trigger" data-preview="{{.PreviewPath}}">
                <img src="{{.ThumbPath}}" alt="{{.Filename}}" title="{{.Filename}}" loading="lazy"
                    width="{{.ThumbWidth}}" height="{{.ThumbHeight}}">
            </a>
            <button class="photo-menu-btn" data-filename="{{.Filename}}">&#8942;</button>
            <div class="dropdown-content">
                <a href="#" class="info-btn">Info</a>
                <a href="#" class="change-date-btn">Change date</a>
                <a href="#" class="delete-btn">Delete</a>
            </div>
        </div>
        {{end}}
    </div>
    {{end}}
    {{else}}
    <p style="padding-left: 1em;">No photos have been uploaded yet.</p>
    {{end}}
</div>

{{end}}
