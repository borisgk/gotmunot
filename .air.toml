root = "."
tmp_dir = "tmp"

[build]
cmd = "./build_server.sh"
bin = "tmp/tm25"
full_bin = "./tmp/tm25"
include_ext = ["go", "tpl", "tmpl", "html", "css", "js"]
exclude_dir = ["assets", "tmp", "vendor", "testdata", "data"]
include_dir = []
exclude_file = []
delay = 1000
stop_on_error = true
log = "air_errors.log"

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true